# EVE ESI Tool Configuration
# Copy this file to config.yaml and fill in your values.
#
# Register your application at https://developers.eveonline.com/
# Set the callback URL to: http://localhost:8182/callback
#
eve_sso:
  client_id: "YOUR_CLIENT_ID_HERE"
  # Secret key is optional for PKCE-only apps (recommended for desktop apps)
  # client_secret: "YOUR_SECRET_KEY_HERE"
  callback_url: "http://localhost:8182/callback"
  scopes:
    - "esi-skills.read_skills.v1"
    - "esi-skills.read_skillqueue.v1"
    - "esi-characters.read_blueprints.v1"
    - "esi-assets.read_assets.v1"
    - "esi-wallet.read_character_wallet.v1"
    - "esi-fittings.read_fittings.v1"
    - "esi-fittings.write_fittings.v1"
    - "esi-markets.read_character_orders.v1"
    - "esi-industry.read_character_jobs.v1"
    - "esi-location.read_location.v1"
    - "esi-location.read_ship_type.v1"
    - "esi-clones.read_clones.v1"
    - "esi-clones.read_implants.v1"
    - "esi-contracts.read_character_contracts.v1"
    - "esi-universe.read_structures.v1"

# Where to store authentication tokens (encrypted)
token_storage:
  path: "tokens.json"

